severity_levels:
  P1:
    threshold: 0.15   # ~2 strong keywords out of 13 is sufficient for critical alert
    keywords:
      - fatal
      - down
      - oom
      - outage
      - crash
      - unresponsive
      - data loss
      - security breach
      - breach
      - compromised
      - exploit
      - vulnerability
      - critical
    patterns:
      - ".*database.*down.*"
      - ".*service.*unresponsive.*"
      - ".*application.*crash.*"
      - ".*critical.*error.*"
      - ".*fatal.*exception.*"
      - ".*security.*breach.*"
      - ".*data.*loss.*"
      - ".*vulnerability.*exploit.*"
      - ".*compromised.*"
      - ".*outage.*"
      - ".*oom.*"
      - ".*memory.*leak.*"

  P2:
    threshold: 0.25   # ~2 keywords out of 7 is sufficient for high alert
    keywords:
      - error
      - exception
      - failed
      - timeout
      - unprocessable
      - unreachable
      - overload
    patterns:
      - ".*connection.*refused.*"
      - ".*memory.*threshold.*exceeded.*"

  P3:
    threshold: 0.40   # ~2-3 keywords out of 5
    keywords:
      - warning
      - slow
      - degraded
      - retry
      - latency
    patterns:
      - ".*response.*time.*high.*"

  P4:
    threshold: 0.20   # just below the 0.25 a single P4 keyword scores, so lone
                      # informational words don't trigger P4 classification early
    keywords:
      - notice
      - info
      - scheduled
      - deploy
    patterns: []

source_weights:
  sentry: 0.80
  uptime_robot: 0.90
  logs: 0.50
  db: 0.70
  ticket: 0.40
  unknown: 0.30
